# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name family-finance.cloud www.family-finance.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name family-finance.cloud www.family-finance.cloud;

    # SSL 证书
    ssl_certificate     /etc/nginx/ssl/live/family-finance.cloud/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/family-finance.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # 允许上传账单文件（最大50MB）
    client_max_body_size 50M;

    # gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # SPA路由支持
    location / {
        # 入口 index.html 不缓存，确保部署后浏览器立即拿到新版本
        # （哈希资源 js/css 仍走下方 1y immutable 强缓存，互不影响）
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API代理
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # MCP (QClaw 智能体) 端点代理
    # - 精确匹配 /mcp，转发至后端根路径（MCP 不走 /api 前缀，绕开网页 JWT 守卫）
    # - 透传客户端 X-API-Key 鉴权头
    # - 关闭缓冲、放大超时，支持流式（SSE）响应与长任务
    location = /mcp {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 透传智能体鉴权头（MCP 使用 X-API-Key）
        proxy_set_header X-API-Key $http_api_key;
        # 流式 / 长响应支持
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }

    # WebSocket代理
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
